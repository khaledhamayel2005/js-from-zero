<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>
    <p class="subtitle">Add tasks and track your progress</p>

    <div class="input-section">
      <input type="text" id="todoInput" placeholder="Add a new task..." class="todo-input">
      <button id="addBtn" class="add-btn">Add +</button>
    </div>

    <ul id="todoList" class="todo-list"></ul>
    <p id="emptyMsg" class="empty-message">No tasks yet. Add one now.</p>
  </div>

  <script src="main.js"></script>
</body>
</html>
